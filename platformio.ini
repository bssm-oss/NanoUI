; NanoUI – PlatformIO project configuration
; Board  : WEMOS LOLIN D32 (ESP32 240MHz / 4MB flash)
; -------------------------------------------------------
; src_dir 는 [platformio] 섹션에서만 설정 가능 (PlatformIO 6.x).
; 예제를 바꾸려면 src_dir 값을 수정하거나,
; 각 예제 디렉터리의 platformio.ini를 직접 사용하세요:
;
;   cd examples/basic_button  && pio run -t upload
;   cd examples/multi_screen  && pio run -t upload
;   cd examples/sensor_dashboard && pio run -t upload
;
; Build   : pio run
; Upload  : pio run -t upload
; Monitor : pio device monitor

[platformio]
default_envs = lolin_d32
src_dir = examples/basic_button

; ── 공통 설정 ──────────────────────────────────────────
[env:lolin_d32]
platform  = espressif32
board     = lolin_d32
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

build_flags =
    -DMAX_COMPONENTS_PER_SCREEN=20
    -DMAX_SCREENS=5

lib_ldf_mode = deep+

lib_deps =
    adafruit/Adafruit ILI9341@^1.6.0
    adafruit/Adafruit GFX Library@^1.11.0
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit BusIO@^1.14.0

; 부모 디렉터리에서 NanoUI 라이브러리를 탐색
lib_extra_dirs = ${PROJECT_DIR}/..
